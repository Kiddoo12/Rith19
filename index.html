<script>
    // --- 1. POPUP & GLOBAL SITE NAVIGATION LAYERS ---
    function enterWebsite() {
        const overlay = document.getElementById('welcomePopUp');
        overlay.style.opacity = '0';
        setTimeout(() => {
            overlay.style.display = 'none';
        }, 500);
    }

    function switchGame(gameType) {
        // Manage Tabs
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        // Manage Panels
        document.getElementById('footballPanel').classList.remove('active');
        document.getElementById('snakePanel').classList.remove('active');

        if (gameType === 'football') {
            document.querySelector('.tab-btn[onclick*="football"]').classList.add('active');
            document.getElementById('footballPanel').classList.add('active');
            initFootballGame();
        } else if (gameType === 'snake') {
            document.querySelector('.tab-btn[onclick*="snake"]').classList.add('active');
            document.getElementById('snakePanel').classList.add('active');
            initSnakeGame();
        }
    }

    // --- 2. FOOTBALL (PONG STYLE) ARCADE ENGINE ---
    const fbCanvas = document.getElementById('footballCanvas');
    const fbCtx = fbCanvas.getContext('2d');
    let fbAnimationId;

    let playerY = 160, aiY = 160;
    const paddleWidth = 12, paddleHeight = 80;
    let ballX = 350, ballY = 200;
    let ballSpeedX = 4, ballSpeedY = 4;
    let playerScore = 0, aiScore = 0;
    let keysPressed = {};

    function initFootballGame() {
        if (fbAnimationId) cancelAnimationFrame(fbAnimationId);
        ballX = fbCanvas.width / 2;
        ballY = fbCanvas.height / 2;
        ballSpeedX = 4 * (Math.random() > 0.5 ? 1 : -1);
        ballSpeedY = 3 * (Math.random() > 0.5 ? 1 : -1);
        fbUpdate();
    }

    function fbUpdate() {
        // Player Movement Controls
        if (keysPressed['w'] || keysPressed['ArrowUp'] || keysPressed['touchUp']) {
            playerY = Math.max(10, playerY - 6);
        }
        if (keysPressed['s'] || keysPressed['ArrowDown'] || keysPressed['touchDown']) {
            playerY = Math.min(fbCanvas.height - paddleHeight - 10, playerY + 6);
        }

        // Simple AI Tracking Core
        let aiCenter = aiY + paddleHeight / 2;
        if (aiCenter < ballY - 15) aiY = Math.min(fbCanvas.height - paddleHeight - 10, aiY + 4.5);
        else if (aiCenter > ballY + 15) aiY = Math.max(10, aiY - 4.5);

        // Physics Boundary Calculations
        ballX += ballSpeedX;
        ballY += ballSpeedY;

        if (ballY <= 10 || ballY >= fbCanvas.height - 10) ballSpeedY = -ballSpeedY;

        // Player Collision Field
        if (ballX <= 30 && ballX >= 15 && ballY >= playerY && ballY <= playerY + paddleHeight) {
            ballSpeedX = Math.abs(ballSpeedX) + 0.3; // Incremental acceleration
            ballSpeedY += (ballY - (playerY + paddleHeight / 2)) * 0.1;
        }
        // AI Collision Field
        if (ballX >= fbCanvas.width - 30 && ballX <= fbCanvas.width - 15 && ballY >= aiY && ballY <= aiY + paddleHeight) {
            ballSpeedX = -Math.abs(ballSpeedX) - 0.3;
            ballSpeedY += (ballY - (aiY + paddleHeight / 2)) * 0.1;
        }

        // Goal Check Analysis
        if (ballX < 0) { aiScore++; initFootballGame(); return; }
        if (ballX > fbCanvas.width) { playerScore++; initFootballGame(); return; }

        // Render Field Configurations
        fbCtx.fillStyle = '#15803d';
        fbCtx.fillRect(0, 0, fbCanvas.width, fbCanvas.height);

        // Render Pitch Markings
        fbCtx.strokeStyle = 'rgba(255,255,255,0.4)';
        fbCtx.lineWidth = 4;
        fbCtx.strokeRect(10, 10, fbCanvas.width - 20, fbCanvas.height - 20);
        fbCtx.beginPath();
        fbCtx.moveTo(fbCanvas.width / 2, 10);
        fbCtx.lineTo(fbCanvas.width / 2, fbCanvas.height - 10);
        fbCtx.stroke();

        // Render Center Circle
        fbCtx.beginPath();
        fbCtx.arc(fbCanvas.width / 2, fbCanvas.height / 2, 50, 0, Math.PI * 2);
        fbCtx.stroke();

        // Render Striker Paddles
        fbCtx.fillStyle = '#60a5fa'; // Player Blue
        fbCtx.fillRect(18, playerY, paddleWidth, paddleHeight);
        fbCtx.fillStyle = '#ef4444'; // Enemy Red
        fbCtx.fillRect(fbCanvas.width - 30, aiY, paddleWidth, paddleHeight);

        // Render Ball Graphic
        fbCtx.fillStyle = '#ffffff';
        fbCtx.beginPath();
        fbCtx.arc(ballX, ballY, 8, 0, Math.PI * 2);
        fbCtx.fill();

        // Render Real-time Arcade Scoring Layouts
        fbCtx.font = 'bold 32px sans-serif';
        fbCtx.fillStyle = 'rgba(255,255,255,0.7)';
        fbCtx.fillText(playerScore, fbCanvas.width / 2 - 60, 50);
        fbCtx.fillText(aiScore, fbCanvas.width / 2 + 40, 50);

        fbAnimationId = requestAnimationFrame(fbUpdate);
    }

    // --- 3. RETRO SNAKE ARCADE ENGINE ---
    const snakeCanvas = document.getElementById('snakeCanvas');
    const snakeCtx = snakeCanvas.getContext('2d');
    let snakeTimerId;

    let snake = [{x: 200, y: 200}];
    let dx = 20, dy = 0;
    let foodX, foodY;
    let snakeScore = 0, snakeHighScore = 0;
    const gridCellSize = 20;

    function initSnakeGame() {
        if (snakeTimerId) clearInterval(snakeTimerId);
        snake = [{x: 200, y: 200}, {x: 180, y: 200}, {x: 160, y: 200}];
        dx = 20; dy = 0;
        snakeScore = 0;
        document.getElementById('currentSnakeScore').innerText = snakeScore;
        generateFood();
        snakeTimerId = setInterval(snakeUpdate, 100);
    }

    function snakeUpdate() {
        if (checkSnakeCollision()) {
            clearInterval(snakeTimerId);
            alert("Game Over! Score: " + snakeScore);
            initSnakeGame();
            return;
        }

        // Advance Snake Position Matrix
        const head = {x: snake[0].x + dx, y: snake[0].y + dy};
        snake.unshift(head);

        // Check Food Intersection
        if (head.x === foodX && head.y === foodY) {
            snakeScore += 10;
            document.getElementById('currentSnakeScore').innerText = snakeScore;
            if (snakeScore > snakeHighScore) {
                snakeHighScore = snakeScore;
                document.getElementById('highSnakeScore').innerText = snakeHighScore;
            }
            generateFood();
        } else {
            snake.pop();
        }

        // Render Grid Sandbox
        snakeCtx.fillStyle = '#020617';
        snakeCtx.fillRect(0, 0, snakeCanvas.width, snakeCanvas.height);

        // Render Target Object (Food Apple)
        snakeCtx.fillStyle = '#ef4444';
        snakeCtx.fillRect(foodX + 2, foodY + 2, gridCellSize - 4, gridCellSize - 4);

        // Render Snake Array Elements
        snake.forEach((part, index) => {
            snakeCtx.fillStyle = index === 0 ? '#22c55e' : '#16a34a';
            snakeCtx.fillRect(part.x + 1, part.y + 1, gridCellSize - 2, gridCellSize - 2);
        });
    }

    function generateFood() {
        foodX = Math.floor(Math.random() * (snakeCanvas.width / gridCellSize)) * gridCellSize;
        foodY = Math.floor(Math.random() * (snakeCanvas.height / gridCellSize)) * gridCellSize;
        // Verify food doesn't overlay snake array positions
        snake.forEach(part => {
            if (part.x === foodX && part.y === foodY) generateFood();
        });
    }

    function checkSnakeCollision() {
        const head = snake[0];
        // Wall boundaries collisions
        if (head.x < 0 || head.x >= snakeCanvas.width || head.y < 0 || head.y >= snakeCanvas.height) return true;
        // Tail collision loops
        for (let i = 1; i < snake.length; i++) {
            if (snake[i].x === head.x && snake[i].y === head.y) return true;
        }
        return false;
    }

    // --- 4. HARDWARE INPUT LISTENER ARRAYS (DESKTOP KEYBOARD) ---
    window.addEventListener('keydown', e => {
        keysPressed[e.key] = true;
        
        // Prevent window viewport scrolling configurations while interacting with games
        if (["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.code)) {
            e.preventDefault();
        }

        // Snake Steering Axis Matrix Mapping
        if (document.getElementById('snakePanel').classList.contains('active')) {
            if ((e.key === 'ArrowUp' || e.key === 'w') && dy === 0) { dx = 0; dy = -gridCellSize; }
            if ((e.key === 'ArrowDown' || e.key === 's') && dy === 0) { dx = 0; dy = gridCellSize; }
            if ((e.key === 'ArrowLeft' || e.key === 'a') && dx === 0) { dx = -gridCellSize; dy = 0; }
            if ((e.key === 'ArrowRight' || e.key === 'd') && dx === 0) { dx = gridCellSize; dy = 0; }
        }
    });

    window.addEventListener('keyup', e => { keysPressed[e.key] = false; });

    // --- 5. TOUCHSCREEN D-PAD RUNTIMES (TABLET/IPAD COMPATIBILITY) ---
    function configureTouchControls(btnId, targetKey) {
        const el = document.getElementById(btnId);
        if (!el) return;

        const startAction = (e) => {
            e.preventDefault();
            keysPressed[targetKey] = true;
            
            // Handle Snake Discrete direction updates instantly on interface tap
            if (document.getElementById('snakePanel').classList.contains('active')) {
                if (targetKey === 'sUp' && dy === 0) { dx = 0; dy = -gridCellSize; }
                if (targetKey === 'sDown' && dy === 0) { dx = 0; dy = gridCellSize; }
                if (targetKey === 'sLeft' && dx === 0) { dx = -gridCellSize; dy = 0; }
                if (targetKey === 'sRight' && dx === 0) { dx = gridCellSize; dy = 0; }
            }
        };

        const stopAction = (e) => {
            e.preventDefault();
            keysPressed[targetKey] = false;
        };

        el.addEventListener('touchstart', startAction, { passive: false });
        el.addEventListener('touchend', stopAction, { passive: false });
        el.addEventListener('mousedown', startAction);
        el.addEventListener('mouseup', stopAction);
    }

    // Bind Touch Controllers to Loop Frameworks
    configureTouchControls('touchUp', 'touchUp');
    configureTouchControls('touchDown', 'touchDown');
    configureTouchControls('sUp', 'sUp');

    // Dynamically insert remaining directional elements into your structural D-Pad layout
    const dPadElement = document.querySelector('.d-pad');
    if (dPadElement) {
        dPadElement.innerHTML = `
            <button class="d-btn d-up" id="sUp">▲</button>
            <button class="d-btn d-left" id="sLeft">◀</button>
            <button class="d-btn d-right" id="sRight">▶</button>
            <button class="d-btn d-down" id="sDown">▼</button>
        `;
        configureTouchControls('sUp', 'sUp');
        configureTouchControls('sLeft', 'sLeft');
        configureTouchControls('sRight', 'sRight');
        configureTouchControls('sDown', 'sDown');
    }

    // Auto-Run Default Selection Loop on Execution Init
    window.onload = () => {
        initFootballGame();
    };
</script>
</body>
</html>
